<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Blog</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #222;
      margin: 0;
      line-height: 1.6;
    }

    header {
      background-color: #222;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      margin: 0;
    }

    main {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .post-card {
      background: white;
      padding: 25px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .post-card h2 {
      margin-top: 0;
    }

    .date {
      color: #777;
      font-size: 14px;
    }

    .read-more {
      display: inline-block;
      margin-top: 10px;
      color: #007acc;
      font-weight: bold;
      text-decoration: none;
    }

    .read-more:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Sup!</h1>
    <p>Things/Topics I’m interested in, and enjoy sharing.</p>
  </header>

  <main>
    <article class="post-card">
      <h2>Init</h2>
      <p class="date">Published on June 25, 2026</p>
      <p>
        Hello world!
      </p>
      <a class="read-more" href="posts/init.html">Read more...</a>
    </article>
  </main>

  <footer>
    <p>Made by mo | Hosted on GitHub Pages</p>
  </footer>
</body>
</html>
