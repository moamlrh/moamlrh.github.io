<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ASCEND — stack the skyline</title>
<style>
  :root{
    --ink:#f4ecff;
    --muted:#a99fc7;
    --accent:#ff9d6c;
    --panel-edge:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#0d0820;
    color:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    /* ambient frame for wide screens */
    background:radial-gradient(120% 90% at 50% -10%, #2a1b4d 0%, #160e2e 45%, #0a0618 100%);
    touch-action:none;
    user-select:none;
  }
  #stage{
    position:relative;
    width:min(100vw,480px);
    height:100%;
    height:100dvh;
    box-shadow:0 0 80px rgba(0,0,0,.55), inset 0 0 0 1px var(--panel-edge);
    overflow:hidden;
  }
  canvas{display:block;width:100%;height:100%;}

  /* ---------- overlays ---------- */
  .layer{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:28px;
    pointer-events:none;opacity:0;transform:translateY(8px);
    transition:opacity .45s ease, transform .45s ease;
  }
  .layer.show{opacity:1;transform:none;pointer-events:auto;}

  .title{
    font-size:clamp(46px,15vw,76px);
    font-weight:800;letter-spacing:.14em;margin:0;
    line-height:.95;
    background:linear-gradient(180deg,#fff 0%, #ffd2b0 55%, var(--accent) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 6px 30px rgba(255,157,108,.25);
  }
  .tagline{margin:14px 0 0;color:var(--muted);font-size:15px;letter-spacing:.22em;text-transform:uppercase;}

  .pulse{
    margin-top:46px;color:var(--ink);font-size:15px;letter-spacing:.18em;text-transform:uppercase;
    animation:breathe 1.8s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.45;}50%{opacity:1;}}

  .go-score{font-size:clamp(72px,24vw,120px);font-weight:800;margin:6px 0 0;line-height:1;}
  .go-label{color:var(--muted);font-size:13px;letter-spacing:.3em;text-transform:uppercase;}
  .go-best{margin-top:18px;color:var(--accent);font-size:16px;letter-spacing:.12em;}
  .go-best.new{animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);}}

  .btn{
    margin-top:34px;pointer-events:auto;cursor:pointer;
    border:0;border-radius:999px;
    padding:15px 40px;
    font:inherit;font-weight:700;font-size:16px;letter-spacing:.12em;text-transform:uppercase;
    color:#1a0f33;
    background:linear-gradient(180deg,#ffd2b0,var(--accent));
    box-shadow:0 10px 30px rgba(255,157,108,.35);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:translateY(2px) scale(.98);box-shadow:0 6px 18px rgba(255,157,108,.3);}
  .btn:focus-visible{outline:3px solid #fff;outline-offset:3px;}

  /* sound toggle */
  #sound{
    position:absolute;top:14px;right:14px;z-index:5;
    width:42px;height:42px;border-radius:12px;
    display:grid;place-items:center;cursor:pointer;
    background:rgba(255,255,255,.06);border:1px solid var(--panel-edge);
    color:var(--ink);font-size:18px;pointer-events:auto;
    transition:background .15s ease;
  }
  #sound:hover{background:rgba(255,255,255,.12);}
  #sound:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    .pulse{animation:none;opacity:.8;}
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <button id="sound" aria-label="Toggle sound">♪</button>

    <!-- Start -->
    <div id="menu" class="layer show">
      <h1 class="title">ASCEND</h1>
      <p class="tagline">stack the skyline</p>
      <div class="pulse">Tap to begin</div>
    </div>

    <!-- Game over -->
    <div id="over" class="layer">
      <div class="go-label">Height reached</div>
      <div id="finalScore" class="go-score">0</div>
      <div id="best" class="go-best">Best 0</div>
      <button id="again" class="btn">Play again</button>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---------- canvas setup ----------
  const stage  = document.getElementById('stage');
  const canvas = document.getElementById('game');
  const ctx    = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth;
    H = stage.clientHeight;
    canvas.width  = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- tunables (derived from current size) ----------
  let BLOCK_H, INIT_W, PERFECT_TOL, GROW, START_SPEED, SPEED_STEP, MAX_SPEED, ANCHOR;
  function deriveConstants(){
    BLOCK_H    = Math.max(26, Math.min(42, Math.round(H * 0.052)));
    INIT_W     = Math.min(Math.round(W * 0.62), 240);
    PERFECT_TOL= Math.max(5, Math.round(W * 0.014));
    GROW       = Math.round(W * 0.018);
    START_SPEED= W * 0.95;            // px / second
    SPEED_STEP = W * 0.022;
    MAX_SPEED  = W * 2.3;
    ANCHOR     = H * 0.40;            // where the active block hovers on screen
  }

  // ---------- state ----------
  const State = { MENU:0, PLAY:1, OVER:2 };
  let state = State.MENU;

  let placed = [];     // {x,w,hue,level}
  let active = null;   // moving block
  let debris = [];     // falling slices
  let rings  = [];     // perfect-hit shockwaves
  let stars  = [];     // ambient background
  let camY = 0, camTarget = 0;
  let shake = 0;
  let combo = 0;
  let score = 0;
  let baseHue = 0;
  let overStartedAt = 0;
  let hintAlpha = 1;

  let best = 0;
  try { best = parseInt(localStorage.getItem('ascend_best') || '0', 10) || 0; } catch(e){}

  // ---------- audio (lazy, gated behind first tap) ----------
  let audioCtx = null, muted = false;
  try { muted = localStorage.getItem('ascend_muted') === '1'; } catch(e){}
  const soundBtn = document.getElementById('sound');
  function paintSoundBtn(){ soundBtn.textContent = muted ? '○' : '♪'; soundBtn.style.opacity = muted ? .5 : 1; }
  paintSoundBtn();
  soundBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    muted = !muted;
    try { localStorage.setItem('ascend_muted', muted ? '1' : '0'); } catch(err){}
    paintSoundBtn();
  });
  function ensureAudio(){
    if(!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(freq, dur, type, vol){
    if(muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.06, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndPlace(){ tone(220, 0.10, 'triangle', 0.05); }
  function sndPerfect(c){ const f = 440 * Math.pow(1.0595, Math.min(c,18)); tone(f, 0.16, 'sine', 0.07); tone(f*2, 0.10, 'sine', 0.03); }
  function sndFail(){ tone(160, 0.30, 'sawtooth', 0.05); tone(110, 0.40, 'sine', 0.05); }

  // ---------- helpers ----------
  const lerp = (a,b,t)=>a+(b-a)*t;
  const clamp = (v,a,b)=>v<a?a:v>b?b:v;

  function blockColor(hue, light){
    return `hsl(${hue},68%,${light}%)`;
  }

  function makeStars(){
    stars = [];
    const n = Math.round(W*H/14000);
    for(let i=0;i<n;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*1.6+0.3,
        a: Math.random()*0.5+0.15,
        tw: Math.random()*Math.PI*2,
        sp: Math.random()*0.6+0.2
      });
    }
  }

  // ---------- game flow ----------
  function reset(){
    deriveConstants();
    placed = [];
    debris = [];
    rings  = [];
    combo  = 0;
    score  = 0;
    shake  = 0;
    hintAlpha = 1;
    baseHue = Math.random()*360;
    makeStars();

    // base block, centered
    placed.push({ x:(W-INIT_W)/2, w:INIT_W, hue:baseHue, level:0 });
    spawnActive();
    // snap camera
    camTarget = ANCHOR + active.level*BLOCK_H;
    camY = camTarget;
  }

  function spawnActive(){
    const top = placed[placed.length-1];
    const level = placed.length;
    const fromLeft = (level % 2 === 0);
    const w = top.w;
    active = {
      x: fromLeft ? 0 : (W - w),
      w: w,
      hue: (baseHue + level*9) % 360,
      level: level,
      dir: fromLeft ? 1 : -1,
      speed: Math.min(START_SPEED + level*SPEED_STEP, MAX_SPEED)
    };
  }

  function startGame(){
    ensureAudio();
    reset();
    state = State.PLAY;
    showLayer('menu', false);
    showLayer('over', false);
  }

  function drop(){
    const below = placed[placed.length-1];
    const diff = active.x - below.x;

    // ---- perfect ----
    if(Math.abs(diff) <= PERFECT_TOL){
      active.x = below.x;
      active.w = below.w;
      combo++;
      // forgiveness: grow back toward the original width after a hot streak
      if(combo >= 4 && active.w < INIT_W){
        const g = Math.min(GROW, INIT_W - active.w);
        active.w += g;
        active.x = clamp(active.x - g/2, 0, W - active.w);
      }
      rings.push({ x:active.x+active.w/2, level:active.level, r:0, max:active.w*0.9, life:1 });
      shake = Math.min(shake + 5, 14);
      sndPerfect(combo);
    } else {
      // ---- sliced placement ----
      combo = 0;
      const oL = Math.max(below.x, active.x);
      const oR = Math.min(below.x+below.w, active.x+active.w);
      const oW = oR - oL;

      if(oW <= 0){
        // total miss — the whole block tumbles, game over
        debris.push(makeDebris(active.x, active.w, active.level, active.hue, diff>0?1:-1));
        sndFail();
        gameOver();
        return;
      }

      // overhang becomes debris
      let dx, dw;
      if(diff > 0){ dx = oR; dw = (active.x+active.w) - oR; }   // sticks out right
      else        { dx = active.x; dw = oL - active.x; }        // sticks out left
      if(dw > 0.5) debris.push(makeDebris(dx, dw, active.level, active.hue, diff>0?1:-1));

      active.x = oL;
      active.w = oW;
      sndPlace();
    }

    placed.push({ x:active.x, w:active.w, hue:active.hue, level:active.level });
    score = placed.length - 1;
    spawnActive();
    camTarget = ANCHOR + active.level*BLOCK_H;
  }

  function makeDebris(x, w, level, hue, sideDir){
    return {
      x:x, w:w, worldY:-level*BLOCK_H,
      vx: sideDir * (40 + Math.random()*60),
      vy: -40 - Math.random()*40,
      rot:0, vr: sideDir * (1.5 + Math.random()*2),
      hue:hue, a:1
    };
  }

  function gameOver(){
    state = State.OVER;
    overStartedAt = performance.now();
    let isNew = false;
    if(score > best){ best = score; isNew = true; try{ localStorage.setItem('ascend_best', String(best)); }catch(e){} }
    document.getElementById('finalScore').textContent = score;
    const bestEl = document.getElementById('best');
    bestEl.textContent = isNew ? '★ New best!' : ('Best ' + best);
    bestEl.classList.toggle('new', isNew);
    showLayer('over', true);
  }

  function showLayer(id, on){
    document.getElementById(id).classList.toggle('show', on);
  }

  // ---------- input ----------
  function press(){
    if(state === State.MENU){ startGame(); return; }
    if(state === State.PLAY){ ensureAudio(); hintAlpha = 0; drop(); return; }
    if(state === State.OVER){
      // small guard so the game-over tap doesn't instantly restart
      if(performance.now() - overStartedAt > 450) startGame();
    }
  }
  // pointer (covers mouse + touch)
  stage.addEventListener('pointerdown', (e)=>{
    if(e.target === soundBtn || e.target.closest('#sound') || e.target.classList.contains('btn')) return;
    press();
  });
  document.getElementById('again').addEventListener('click', (e)=>{ e.stopPropagation(); startGame(); });
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowUp'){ e.preventDefault(); press(); }
  });
  window.addEventListener('contextmenu', (e)=>e.preventDefault());

  // ---------- update ----------
  let last = performance.now();
  function update(dt){
    // ambient
    for(const s of stars){ s.tw += dt*s.sp; }
    if(shake > 0) shake = Math.max(0, shake - dt*40);
    if(hintAlpha < 1 && state!==State.PLAY) hintAlpha = 1;

    if(state === State.PLAY){
      active.x += active.dir * active.speed * dt;
      const maxX = W - active.w;
      if(active.x <= 0){ active.x = 0; active.dir = 1; }
      else if(active.x >= maxX){ active.x = maxX; active.dir = -1; }
    }

    camY = lerp(camY, camTarget, Math.min(1, dt*6));

    // debris physics
    for(let i=debris.length-1;i>=0;i--){
      const d = debris[i];
      d.vy += 1400 * dt;
      d.worldY += d.vy * dt;
      d.x += d.vx * dt;
      d.rot += d.vr * dt;
      d.a -= dt*0.55;
      const screenY = d.worldY + camY;
      if(screenY > H + 120 || d.a <= 0) debris.splice(i,1);
    }

    // perfect rings
    for(let i=rings.length-1;i>=0;i--){
      const r = rings[i];
      r.r += dt*420;
      r.life -= dt*1.6;
      if(r.life <= 0) rings.splice(i,1);
    }
  }

  // ---------- draw ----------
  function drawBlock(x, screenTop, w, hue){
    const h = BLOCK_H;
    // top face
    ctx.fillStyle = blockColor(hue, 62);
    ctx.fillRect(x, screenTop, w, h);
    // bottom shadow face (fake depth)
    ctx.fillStyle = blockColor(hue, 44);
    ctx.fillRect(x, screenTop + h - Math.min(6, h*0.18), w, Math.min(6, h*0.18));
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.fillRect(x, screenTop, w, 2);
  }

  function draw(){
    // height-driven background hue
    const climb = (placed.length||0);
    const bgHue = (baseHue + climb*4) % 360;

    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, `hsl(${bgHue},45%,16%)`);
    g.addColorStop(0.55, `hsl(${(bgHue+20)%360},48%,10%)`);
    g.addColorStop(1, `hsl(${(bgHue+40)%360},55%,6%)`);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // stars
    for(const s of stars){
      ctx.globalAlpha = s.a * (0.55 + 0.45*Math.sin(s.tw));
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // screen shake
    ctx.save();
    if(shake>0){
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }

    // placed tower
    for(const b of placed){
      const top = -b.level*BLOCK_H + camY;
      if(top > H || top < -BLOCK_H*2) continue;
      drawBlock(b.x, top, b.w, b.hue);
    }

    // debris
    for(const d of debris){
      const top = d.worldY + camY;
      ctx.save();
      ctx.globalAlpha = clamp(d.a,0,1);
      ctx.translate(d.x + d.w/2, top + BLOCK_H/2);
      ctx.rotate(d.rot);
      ctx.fillStyle = blockColor(d.hue, 58);
      ctx.fillRect(-d.w/2, -BLOCK_H/2, d.w, BLOCK_H);
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // active block
    if(state === State.PLAY && active){
      const top = -active.level*BLOCK_H + camY;
      drawBlock(active.x, top, active.w, active.hue);
    }

    // perfect rings
    for(const r of rings){
      const cy = -r.level*BLOCK_H + camY + BLOCK_H/2;
      ctx.globalAlpha = clamp(r.life,0,1)*0.6;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(r.x, cy, r.r, r.r*0.5, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // ---- HUD ----
    if(state === State.PLAY){
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.96)';
      ctx.font = '800 64px "Trebuchet MS", system-ui, sans-serif';
      ctx.fillText(String(score), W/2, 96);

      if(combo >= 2){
        ctx.fillStyle = '#ff9d6c';
        ctx.font = '700 20px "Trebuchet MS", system-ui, sans-serif';
        ctx.fillText('PERFECT ×' + combo, W/2, 126);
      }

      // first-time hint
      if(hintAlpha > 0 && placed.length <= 1){
        ctx.globalAlpha = hintAlpha;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.font = '600 16px "Trebuchet MS", system-ui, sans-serif';
        ctx.fillText('Tap / Space to drop', W/2, H*0.62);
        ctx.globalAlpha = 1;
      }
    }
  }

  // ---------- loop ----------
  function frame(now){
    let dt = (now - last)/1000;
    if(dt > 0.05) dt = 0.05; // clamp big gaps (tab switches)
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  // boot
  makeStars();
  // draw a calm idle tower behind the menu
  reset();
  state = State.MENU;
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
